<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolBox — Offline Developer Utilities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Paint a dark canvas immediately so there is no white flash before the
         CSS bundle / React splash mount. -->
    <style>
      html, body { margin: 0; height: 100%; background: #0a0c10; }
      #root { height: 100vh; }
      #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #0a0c10; }
      #boot .d { width: 8px; height: 8px; border-radius: 50%; background: #2fe6d2; box-shadow: 0 0 12px #2fe6d2; animation: bootp 1.2s ease-in-out infinite; }
      @keyframes bootp { 0%,100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body>
    <!-- instant placeholder, removed as soon as React's splash takes over -->
    <div id="boot"><div class="d"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
