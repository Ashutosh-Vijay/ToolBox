name: Release

# Bump the version: update src/version.ts + src-tauri/tauri.conf.json, then push a
# tag like v0.1.1. This builds the standalone (no-installer) exe, zips it, writes
# latest.json, and publishes a GitHub Release with all three assets. The running
# app reads latest.json to offer in-app self-updates.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build standalone exe (no installer)
        run: npx tauri build --no-bundle

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          cp "src-tauri/target/release/toolbox.exe" "dist-release/ToolBox.exe"
          cd dist-release
          7z a "ToolBox-${{ steps.ver.outputs.version }}-windows.zip" "ToolBox.exe"
          cat > latest.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "notes": "ToolBox ${{ github.ref_name }} — see the release page for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ToolBox ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist-release/ToolBox.exe
            dist-release/ToolBox-${{ steps.ver.outputs.version }}-windows.zip
            dist-release/latest.json
          generate_release_notes: true
